```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Happy 8/3</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
}

/* hoa bay */

.flower{
position:absolute;
bottom:-50px;
font-size:30px;
animation:fly linear forwards;
}

@keyframes fly{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-110vh);
opacity:0;
}
}

/* phần giữa */

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
}

/* tulip lớn */

.tulip{
font-size:120px;
animation:pulse 3s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* lá thư */

.envelope{
font-size:80px;
cursor:pointer;
margin-top:20px;
transition:0.3s;
}

.envelope:hover{
transform:scale(1.15);
}

/* gợi ý */

.hint{
color:white;
font-size:18px;
margin-top:10px;
}

/* màn thư */

.message{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

/* thiệp */

.card{
background:white;
color:#ff4d6d;
padding:40px;
border-radius:20px;
width:360px;
font-size:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
position:relative;
}

/* nút đóng */

.close{
position:absolute;
top:10px;
right:15px;
font-size:22px;
cursor:pointer;
color:#ff4d6d;
}

</style>
</head>

<body>

<div class="center" id="center">

<div class="tulip">🌷</div>

<div class="envelope" onclick="openLetter()">💌</div>

<div class="hint">Nhấn vào lá thư</div>

</div>

<div class="message" id="message">

<div class="card">

<div class="close" onclick="closeLetter()">❌</div>

<h2>🌸 Happy Women's Day 🌸</h2>

<p>
Chúc bạn ngày 8/3 thật nhiều niềm vui,
luôn xinh đẹp và hạnh phúc.
</p>

<p>
Mong rằng mỗi ngày của bạn đều
đầy nụ cười và những điều dễ thương ✨
</p>

<p>
Cảm ơn vì đã làm thế giới này
dễ thương hơn một chút.
</p>

</div>

</div>

<script>

/* hoa bay */

function createFlower(){

const flower=document.createElement("div")

flower.className="flower"
flower.innerHTML="🌷"

flower.style.left=Math.random()*100+"%"

flower.style.animationDuration=4+Math.random()*3+"s"

document.body.appendChild(flower)

setTimeout(()=>{
flower.remove()
},7000)

}

setInterval(createFlower,400)

/* hiện trung tâm */

setTimeout(()=>{
document.getElementById("center").style.display="block"
},3000)

/* mở thư */

function openLetter(){
document.getElementById("message").style.display="flex"
}

/* đóng thư */

function closeLetter(){
document.getElementById("message").style.display="none"
}

</script>

</body>
</html>
```
